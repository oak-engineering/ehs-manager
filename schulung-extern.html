<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EHS Unterweisung – Oak Engineering</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f3;--s1:#ffffff;--s2:#f0efec;--s3:#e8e7e3;
  --border:#d8d7d2;--ok:#2d6a2d;--nok:#c0392b;--warn:#b7860a;
  --text:#1a1a1a;--t2:#555550;--t3:#999990;
  --ff:'DM Sans',sans-serif;--fm:'DM Mono',monospace;--fh:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);font-family:var(--ff);color:var(--text)}
.topbar{background:#1a1a1a;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo img{height:26px;filter:invert(1);opacity:.9}
.topbar-logo span{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.topbar-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.wrap{max-width:700px;margin:0 auto;padding:32px 20px 60px}

/* LOADING */
.loading{text-align:center;padding:80px 20px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FORMULAR */
.form-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:32px;margin-bottom:24px}
.form-card h2{font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:6px}
.form-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.meta-chip{padding:3px 10px;border-radius:20px;font-size:12px;background:var(--s2);border:1px solid var(--border);color:var(--t2)}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;color:var(--t2);margin-bottom:5px;font-weight:500}
input,select,textarea{width:100%;padding:10px 13px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:#1a1a1a}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.g2{grid-template-columns:1fr}}
.btn{width:100%;padding:13px;border-radius:8px;border:none;cursor:pointer;font-family:var(--ff);font-size:15px;font-weight:600;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-p{background:#1a1a1a;color:#fff}.btn-p:hover{background:#333}
.btn-ok{background:var(--ok);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--t2);width:auto;padding:8px 16px;font-size:13px}
.hint{font-size:12px;color:var(--t3);text-align:center;margin-top:12px;line-height:1.6}
.divider{height:1px;background:var(--border);margin:20px 0}

/* INFO BOX */
.info-box{background:rgba(45,106,45,.06);border:1px solid rgba(45,106,45,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--ok);margin-bottom:16px}
.warn-box{background:rgba(183,134,10,.06);border:1px solid rgba(183,134,10,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--warn);margin-bottom:16px}
.err-box{background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--nok);margin-bottom:16px;display:none}

/* PLAYER */
.player-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.player-header{padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10}
.prog-wrap{background:var(--s3);border-radius:4px;height:6px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:3px;background:#1a1a1a;transition:width .4s}
.prog-fill.ok{background:var(--ok)}
.player-body{padding:24px}
.quiz-option{width:100%;padding:13px 16px;margin-bottom:8px;border:2px solid var(--border);border-radius:8px;background:#fff;text-align:left;cursor:pointer;font-family:var(--ff);font-size:14px;transition:all .18s;display:flex;align-items:center;gap:10px}
.quiz-option:hover:not(.disabled){border-color:#1a1a1a;background:var(--s2)}
.quiz-option.correct{border-color:var(--ok);background:rgba(45,106,45,.08);color:var(--ok)}
.quiz-option.wrong{border-color:var(--nok);background:rgba(192,57,43,.08);color:var(--nok)}
.quiz-option.disabled{cursor:default}
.quiz-feedback{padding:12px 16px;border-radius:8px;margin-top:10px;font-size:13px;font-weight:500}
.quiz-feedback.ok{background:rgba(45,106,45,.1);color:var(--ok);border:1px solid rgba(45,106,45,.2)}
.quiz-feedback.nok{background:rgba(192,57,43,.1);color:var(--nok);border:1px solid rgba(192,57,43,.2)}
.player-nav{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.ts{font-size:12px;color:var(--t3)}

/* ERGEBNIS */
.result-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:40px 32px;text-align:center;margin-bottom:16px}
.result-score{font-size:56px;font-weight:800;margin:12px 0 4px}
.result-items{text-align:left;background:var(--s2);border-radius:8px;padding:16px;margin:20px 0}
.result-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.result-item:last-child{border-bottom:none}

/* ERROR PAGE */
.error-page{text-align:center;padding:80px 20px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <img src="logo.png" alt="Oak Engineering" onerror="this.style.display='none'">
    <span>EHS · Unterweisung</span>
  </div>
  <span class="topbar-badge">🔒 Sicherer Link</span>
</div>

<div class="wrap" id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p style="color:var(--t3)">Schulung wird geladen…</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// SUPABASE – ohne Login
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://evlneudkwqhfowyvnknp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2bG5ldWRrd3FoZm93eXZua25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzY4NjgsImV4cCI6MjA5MDg1Mjg2OH0.ARqhc_HiERFnqhZsq75vWNdVDJmj16cldYX7pORwcsY';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ──────────────────────────────────────────────────
let schulung = null;
let teilnehmer = null; // {name, email, firma}
let player = {slide:0, antworten:{}, answered:{}};

function uid(p='X'){return p+Date.now()+Math.random().toString(36).slice(2,5);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function fmt(iso){if(!iso)return'–';try{return new Date(iso).toLocaleDateString('de-DE');}catch{return iso;}}

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError('Kein Schulungslink angegeben.'); return; }
  try {
    const { data, error } = await sb.from('schulungen')
      .select('id, data').eq('id', id).single();
    if (error || !data) { showError('Schulung nicht gefunden. Bitte prüfen Sie den Link.'); return; }
    schulung = { ...data.data, id: data.id };
    showFormular();
  } catch(e) {
    showError('Verbindungsfehler: ' + e.message);
  }
});

// ═══════════════════════════════════════════════════════════
// SCHRITT 1: FORMULAR
// ═══════════════════════════════════════════════════════════
function showFormular() {
  document.getElementById('app').innerHTML = `
    <div class="form-card">
      <h2>${esc(schulung.titel)}</h2>
      <div class="form-meta">
        <span class="meta-chip">📚 ${esc(schulung.kategorie||'')}</span>
        <span class="meta-chip">📝 ${schulung.fragen?.length||0} Fragen</span>
        <span class="meta-chip">✅ Bestehen: ${schulung.bestehensgrenze||80}%</span>
        ${schulung.gueltigBis?`<span class="meta-chip">📅 Gültig bis: ${fmt(schulung.gueltigBis)}</span>`:''}
      </div>

      ${schulung.beschreibung?`<p style="font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:20px">${esc(schulung.beschreibung)}</p>`:''}

      ${schulung.pdf_datei?`
      <div class="info-box" style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <span>📄 Unterweisungsunterlage verfügbar – empfohlen vor dem Start zu lesen</span>
        <button class="btn-o" onclick="openPDF()" style="flex-shrink:0">📖 Lesen</button>
      </div>`:''}

      <div class="divider"></div>
      <p style="font-size:14px;font-weight:600;margin-bottom:16px">Bitte füllen Sie Ihre Daten aus, um die Schulung zu starten:</p>

      <div id="form-err" class="err-box"></div>

      <div class="g2">
        <div class="form-group">
          <label>Vorname, Nachname *</label>
          <input id="f-name" placeholder="Max Mustermann" autocomplete="name">
        </div>
        <div class="form-group">
          <label>E-Mail-Adresse *</label>
          <input id="f-email" type="email" placeholder="max@firma.de" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label>Firma / Organisation</label>
        <input id="f-firma" placeholder="Musterfirma GmbH (optional)" autocomplete="organization">
      </div>

      <div style="margin-top:20px">
        <button class="btn btn-p" onclick="startSchulungExtern()">
          ▶ Schulung starten
        </button>
        <p class="hint">Ihre Angaben werden ausschließlich zur Dokumentation der Schulungsteilnahme verwendet.</p>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('f-name')?.focus(), 100);
}

function openPDF() {
  if (!schulung?.pdf_datei) return;
  const w = window.open();
  w.document.write('<iframe src="'+schulung.pdf_datei+'" style="width:100%;height:100vh;border:none"></iframe>');
}

function startSchulungExtern() {
  const name = document.getElementById('f-name')?.value.trim();
  const email = document.getElementById('f-email')?.value.trim();
  const firma = document.getElementById('f-firma')?.value.trim();
  const err = document.getElementById('form-err');

  if (!name) { err.textContent = 'Bitte geben Sie Ihren Namen ein.'; err.style.display='block'; return; }
  if (!email || !email.includes('@')) { err.textContent = 'Bitte geben Sie eine gültige E-Mail-Adresse ein.'; err.style.display='block'; return; }

  teilnehmer = { name, email, firma };
  player = { slide: 0, antworten: {}, answered: {} };
  showPlayer();
}

// ═══════════════════════════════════════════════════════════
// SCHRITT 2: PLAYER
// ═══════════════════════════════════════════════════════════
function getTotalSlides() { return (schulung?.fragen?.length||0) + 2; }

function showPlayer() {
  document.getElementById('app').innerHTML = `
    <div class="player-card">
      <div class="player-header">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px">
          <div>
            <div style="font-family:var(--fh);font-size:16px;font-weight:700">${esc(schulung.titel)}</div>
            <div class="ts">${esc(schulung.kategorie)} · ${teilnehmer.name}</div>
          </div>
          <span class="ts" id="slide-counter"></span>
        </div>
        <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="player-body" id="player-body"></div>
      <div class="player-nav">
        <button class="btn-o" id="btn-back" onclick="playerBack()" style="display:none">← Zurück</button>
        <div class="ts" id="nav-info" style="flex:1;text-align:center"></div>
        <button class="btn-o" id="btn-next" onclick="playerNext()">Weiter →</button>
      </div>
    </div>`;
  renderSlide();
}

function renderSlide() {
  const total = getTotalSlides();
  const pct = Math.round(player.slide / Math.max(total-1,1) * 100);
  const fill = document.getElementById('prog-fill');
  if (fill) fill.style.width = pct + '%';
  document.getElementById('slide-counter').textContent = (player.slide+1) + ' / ' + total;
  document.getElementById('btn-back').style.display = player.slide > 0 ? 'block' : 'none';

  const body = document.getElementById('player-body');
  const nextBtn = document.getElementById('btn-next');
  const navInfo = document.getElementById('nav-info');

  // INTRO
  if (player.slide === 0) {
    nextBtn.textContent = 'Schulung starten →';
    navInfo.textContent = '';
    body.innerHTML = `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:52px;margin-bottom:16px">📚</div>
        <h2 style="font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:8px">${esc(schulung.titel)}</h2>
        <p style="color:var(--t2);font-size:14px;line-height:1.6;margin-bottom:20px">${schulung.beschreibung?esc(schulung.beschreibung):''}</p>
        <div style="background:var(--s2);border-radius:8px;padding:16px;text-align:left;font-size:13px;display:flex;flex-direction:column;gap:8px">
          <div>👤 Teilnehmer: <strong>${esc(teilnehmer.name)}</strong></div>
          <div>📝 <strong>${schulung.fragen?.length||0}</strong> Verständnisfragen</div>
          <div>✅ Bestehensgrenze: <strong>${schulung.bestehensgrenze||80}%</strong></div>
          ${schulung.pdf_datei?`<div>📄 Unterweisung vorhanden <button class="btn-o" onclick="openPDF()" style="margin-left:8px">📖 Lesen</button></div>`:''}
        </div>
      </div>`;
    return;
  }

  // ERGEBNIS
  if (player.slide === total-1) {
    const fragen = schulung.fragen;
    const richtig = fragen.filter(f => player.antworten[f.id]!=null && f.optionen[player.antworten[f.id]]?.richtig).length;
    const pct = Math.round(richtig/fragen.length*100);
    const bestanden = pct >= (schulung.bestehensgrenze||80);
    nextBtn.textContent = bestanden ? '✓ Abschließen & Ergebnis senden' : '↺ Nochmals versuchen';
    nextBtn.style.cssText = `padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:600;background:${bestanden?'var(--ok)':'#1a1a1a'};color:#fff`;
    navInfo.textContent = '';
    document.getElementById('btn-back').style.display = 'none';
    const fill = document.getElementById('prog-fill');
    if (fill) { fill.style.width = '100%'; if(bestanden) fill.classList.add('ok'); }
    body.innerHTML = `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:56px;margin-bottom:12px">${bestanden?'🎉':'❌'}</div>
        <h2 style="font-family:var(--fh);font-size:24px;font-weight:700;margin-bottom:6px">${bestanden?'Bestanden!':'Nicht bestanden'}</h2>
        <div class="result-score" style="color:${bestanden?'var(--ok)':'var(--nok)'}">${pct}%</div>
        <p style="color:var(--t2);margin-bottom:20px">${richtig} von ${fragen.length} richtig · Mindestens ${schulung.bestehensgrenze||80}% erforderlich</p>
        <div class="result-items">
          ${fragen.map(f => {
            const ai = player.antworten[f.id];
            const r = ai!=null && f.optionen[ai]?.richtig;
            return `<div class="result-item">
              <span style="font-size:16px;flex-shrink:0">${r?'✓':'✗'}</span>
              <div>
                <div style="font-weight:500;color:${r?'var(--ok)':'var(--nok)'}">${esc(f.frage)}</div>
                ${ai!=null?`<div class="ts">Ihre Antwort: ${esc(f.optionen[ai]?.text||'–')}</div>`:'<div class="ts" style="color:var(--nok)">Nicht beantwortet</div>'}
                ${!r&&f.erklaerung?`<div class="ts" style="color:var(--t2);margin-top:2px">💡 ${esc(f.erklaerung)}</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
        ${!bestanden?'<div class="warn-box">Sie haben die Mindestpunktzahl nicht erreicht. Bitte versuchen Sie es erneut.</div>':''}
      </div>`;
    return;
  }

  // FRAGE
  const fi = player.slide - 1;
  const f = schulung.fragen[fi]; if (!f) return;
  const answered = player.answered[f.id];
  const selectedIdx = player.antworten[f.id] ?? null;
  navInfo.textContent = 'Frage ' + (fi+1) + ' von ' + schulung.fragen.length;
  nextBtn.textContent = answered ? 'Weiter →' : 'Überspringen';
  nextBtn.style.cssText = `padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:500;background:${answered?'#1a1a1a':'transparent'};color:${answered?'#fff':'var(--t2)'}`;

  body.innerHTML = `
    <div style="font-size:11px;color:var(--t2);font-family:var(--fm);margin-bottom:12px;text-transform:uppercase;letter-spacing:.1em">Frage ${fi+1} von ${schulung.fragen.length}</div>
    <h3 style="font-size:18px;font-weight:600;line-height:1.5;margin-bottom:20px">${esc(f.frage)}</h3>
    ${f.optionen.map((o,oi) => {
      let cls = 'quiz-option';
      if (answered) {
        cls += ' disabled';
        if (o.richtig) cls += ' correct';
        else if (oi===selectedIdx&&!o.richtig) cls += ' wrong';
      } else if (oi===selectedIdx) cls += ' selected';
      return `<button class="${cls}" onclick="${answered?'':'selectAntwort(\''+f.id+'\','+oi+')'}">
        <span style="width:30px;height:30px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${['A','B','C','D','E','F'][oi]}</span>
        ${esc(o.text)}
      </button>`;
    }).join('')}
    ${answered&&f.erklaerung?`<div class="quiz-feedback ${f.optionen[selectedIdx]?.richtig?'ok':'nok'}">💡 ${esc(f.erklaerung)}</div>`:''}
    ${answered?`<div style="margin-top:16px;text-align:right"><button class="btn-o" onclick="playerNext()">Weiter →</button></div>`:''}`;
}

function selectAntwort(fid, idx) {
  player.antworten[fid] = idx;
  player.answered[fid] = true;
  renderSlide();
}

function playerNext() {
  const total = getTotalSlides();
  if (player.slide === total-1) {
    const fragen = schulung.fragen;
    const richtig = fragen.filter(f=>player.antworten[f.id]!=null&&f.optionen[player.antworten[f.id]]?.richtig).length;
    const pct = Math.round(richtig/fragen.length*100);
    const bestanden = pct >= (schulung.bestehensgrenze||80);
    if (!bestanden) {
      player = {slide:0, antworten:{}, answered:{}};
      renderSlide(); return;
    }
    saveUndAbschliessen(pct, bestanden);
    return;
  }
  player.slide++;
  renderSlide();
}

function playerBack() {
  if (player.slide > 0) { player.slide--; renderSlide(); }
}

// ═══════════════════════════════════════════════════════════
// SCHRITT 3: SPEICHERN & ABSCHLUSS
// ═══════════════════════════════════════════════════════════
async function saveUndAbschliessen(score, bestanden) {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="loading-spinner"></div><p style="color:var(--t3)">Ergebnis wird gespeichert…</p></div>`;

  try {
    await sb.from('protokolle').insert({
      id: uid('EXT'),
      schulung_id: schulung.id,
      user_id: null, // kein Account
      user_name: teilnehmer.name + (teilnehmer.firma ? ' (' + teilnehmer.firma + ')' : ''),
      user_kz: 'EXT',
      score,
      bestanden,
      antworten: player.antworten,
      datum: new Date().toISOString()
    });
  } catch(e) {
    console.warn('Protokoll konnte nicht gespeichert werden:', e.message);
    // Trotzdem Abschlussseite zeigen
  }

  showAbschluss(score, bestanden);
}

function showAbschluss(score, bestanden) {
  document.getElementById('app').innerHTML = `
    <div class="result-card">
      <div style="font-size:64px;margin-bottom:16px">${bestanden?'🎉':'📋'}</div>
      <h2 style="font-family:var(--fh);font-size:26px;font-weight:700;margin-bottom:8px">
        ${bestanden?'Herzlichen Glückwunsch!':'Schulung abgeschlossen'}
      </h2>
      <div style="font-size:48px;font-weight:800;color:${bestanden?'var(--ok)':'var(--nok)'};margin:8px 0">${score}%</div>
      <p style="color:var(--t2);font-size:14px;margin-bottom:24px">
        ${bestanden
          ? `Sie haben die Schulung <strong>${esc(schulung.titel)}</strong> erfolgreich abgeschlossen.`
          : `Sie haben die Schulung <strong>${esc(schulung.titel)}</strong> abgeschlossen, die Mindestpunktzahl jedoch nicht erreicht. Bitte wenden Sie sich an Ihren EHS-Verantwortlichen.`}
      </p>

      <div style="background:var(--s2);border-radius:8px;padding:16px;text-align:left;margin-bottom:20px;font-size:13px">
        <div style="display:flex;flex-direction:column;gap:6px">
          <div>👤 Teilnehmer: <strong>${esc(teilnehmer.name)}</strong>${teilnehmer.firma?' · '+esc(teilnehmer.firma):''}</div>
          <div>📅 Datum: <strong>${new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'})}</strong></div>
          <div>📚 Schulung: <strong>${esc(schulung.titel)}</strong></div>
          <div>✅ Ergebnis: <strong style="color:${bestanden?'var(--ok)':'var(--nok)'}">${score}% – ${bestanden?'Bestanden':'Nicht bestanden'}</strong></div>
        </div>
      </div>

      ${bestanden?`
      <div class="info-box" style="margin-bottom:20px">
        ✓ Ihre Teilnahme wurde erfolgreich dokumentiert. Sie können diese Seite nun schließen.
      </div>`:`
      <div class="warn-box" style="margin-bottom:20px">
        ⚠ Ihre Teilnahme wurde dokumentiert. Bitte wiederholen Sie die Schulung oder wenden Sie sich an Ihren EHS-Verantwortlichen.
      </div>`}

      <button class="btn btn-o" onclick="sendBestaetigung()" style="width:100%;margin-bottom:10px">
        ✉ Bestätigung per E-Mail senden
      </button>
      <p class="hint">Öffnet Ihren E-Mail-Client mit einer vorausgefüllten Bestätigung.</p>
    </div>`;
}

function sendBestaetigung() {
  const betreff = encodeURIComponent(`EHS-Schulung abgeschlossen: ${schulung.titel}`);
  const score = (() => {
    const fragen = schulung.fragen;
    const richtig = fragen.filter(f=>player.antworten[f.id]!=null&&f.optionen[player.antworten[f.id]]?.richtig).length;
    return Math.round(richtig/fragen.length*100);
  })();
  const bestanden = score >= (schulung.bestehensgrenze||80);
  const body = encodeURIComponent(
    `EHS-Schulungsnachweis\n\n` +
    `Teilnehmer: ${teilnehmer.name}\n` +
    (teilnehmer.firma?`Firma: ${teilnehmer.firma}\n`:'') +
    `E-Mail: ${teilnehmer.email}\n` +
    `Schulung: ${schulung.titel}\n` +
    `Kategorie: ${schulung.kategorie||'–'}\n` +
    `Datum: ${new Date().toLocaleDateString('de-DE')}\n` +
    `Ergebnis: ${score}% – ${bestanden?'Bestanden ✓':'Nicht bestanden ✗'}\n\n` +
    `Diese Bestätigung wurde automatisch vom EHS Manager der Oak Engineering erstellt.`
  );
  window.location.href = `mailto:${teilnehmer.email}?subject=${betreff}&body=${body}`;
}

// ── FEHLERSEITE ───────────────────────────────────────────
function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-page">
      <div style="font-size:48px;margin-bottom:16px">⚠</div>
      <h2 style="font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:8px">Schulung nicht verfügbar</h2>
      <p style="color:var(--t2);font-size:14px;line-height:1.6;margin-bottom:24px">${esc(msg)}</p>
      <p style="color:var(--t3);font-size:13px">Bitte wenden Sie sich an Ihren EHS-Verantwortlichen oder fordern Sie einen neuen Link an.</p>
    </div>`;
}
</script>
</body>
</html>
