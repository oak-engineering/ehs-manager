<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EHS Manager – Oak Engineering</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f3;--s1:#ffffff;--s2:#f0efec;--s3:#e8e7e3;
  --border:#d8d7d2;--b2:#c0bfba;--accent:#1a1a1a;
  --ok:#2d6a2d;--nok:#c0392b;--warn:#b7860a;
  --text:#1a1a1a;--t2:#555550;--t3:#999990;
  --ff:'DM Sans',sans-serif;--fm:'DM Mono',monospace;--fh:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--ff);color:var(--text)}
.topnav{height:56px;background:#1a1a1a;display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:0 2px 12px rgba(0,0,0,.2);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-img{height:30px;filter:invert(1)}
.logo-divider{width:1px;height:22px;background:rgba(255,255,255,.2)}
.logo-sub{font-size:12px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase}
.user-chip{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);cursor:pointer;font-size:12px;color:rgba(255,255,255,.8)}
.user-chip:hover{background:rgba(255,255,255,.18)}
.user-av{width:24px;height:24px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#1a1a1a;flex-shrink:0}
.role-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.role-admin{background:rgba(183,134,10,.2);color:#b7860a;border:1px solid rgba(183,134,10,.3)}
.role-ma{background:rgba(45,106,45,.15);color:#2d6a2d;border:1px solid rgba(45,106,45,.25)}
.main{max-width:1100px;margin:0 auto;padding:32px 20px 60px}
.hero{margin-bottom:36px}
.hero-title{font-family:var(--fh);font-size:28px;font-weight:800;margin-bottom:6px}
.hero-sub{font-size:14px;color:var(--t2);line-height:1.6}
.section-title{font-family:var(--fh);font-size:16px;font-weight:700;margin-bottom:14px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px}
.module-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--text);display:flex;flex-direction:column;position:relative;overflow:hidden}
.module-card:hover:not(.locked){border-color:var(--b2);box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-2px)}
.module-card.locked{cursor:default;opacity:.65}
.module-card.locked::after{content:'🔒';position:absolute;top:12px;right:12px;font-size:18px}
.module-icon{font-size:36px;margin-bottom:12px}
.module-name{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:4px}
.module-desc{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:14px;flex:1}
.module-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}
.stat-chip{padding:3px 9px;border-radius:20px;font-size:11px;font-family:var(--fm);background:var(--s2);border:1px solid var(--border);color:var(--t2)}
.stat-chip.warn{background:rgba(183,134,10,.1);border-color:rgba(183,134,10,.25);color:var(--warn)}
.stat-chip.nok{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.25);color:var(--nok)}
.stat-chip.ok{background:rgba(45,106,45,.1);border-color:rgba(45,106,45,.25);color:var(--ok)}
.module-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.locked-msg{font-size:12px;color:var(--t3);margin-top:8px;font-style:italic}
.admin-section{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.admin-btn{padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--s2);cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:500;text-align:left;transition:all .18s;display:flex;align-items:center;gap:10px}
.admin-btn:hover{border-color:var(--b2);background:var(--s3)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.overlay.on{display:flex}
.modal{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px;width:100%;max-width:400px;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.modal-t{font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:18px}
.modal-act{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.btn{padding:9px 16px;border-radius:6px;border:none;cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:500;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:#1a1a1a;color:#fff}.btn-p:hover{background:#333}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--t2)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
.btn-d{background:transparent;border:1px solid rgba(192,57,43,.3);color:var(--nok)}
.btn-sm{padding:6px 11px;font-size:12px}
.divider{height:1px;background:var(--border);margin:14px 0}
.ts{font-size:12px;color:var(--t3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;border:1px solid #333;border-radius:7px;padding:10px 20px;font-size:13px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;color:#fff}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)}.toast.err{background:var(--nok)}
label{display:block;font-size:12px;color:var(--t2);margin-bottom:5px;font-weight:500}
input,select{width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:#1a1a1a}
@media(max-width:600px){.module-grid{grid-template-columns:1fr}.admin-grid{grid-template-columns:1fr 1fr}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.module-card{animation:fadeIn .3s ease both}
.module-card:nth-child(2){animation-delay:.05s}
.module-card:nth-child(3){animation-delay:.1s}
.module-card:nth-child(4){animation-delay:.15s}
.module-card:nth-child(5){animation-delay:.2s}
</style>
</head>
<body>

<div id="app-content" style="display:none;flex-direction:column;min-height:100vh">

<nav class="topnav">
  <div class="logo-wrap">
    <img src="logo.png" alt="Oak Engineering" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-divider"></div>
    <span class="logo-sub">EHS Manager</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="role-display"></span>
    <div class="user-chip" onclick="openUserMenu()">
      <div class="user-av" id="u-av">?</div>
      <span id="u-name">–</span>
    </div>
  </div>
</nav>

<div class="main">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-title" id="hero-title">Guten Tag 👋</div>
    <div class="hero-sub" id="hero-sub">Willkommen im EHS Manager von Oak Engineering. Wählen Sie ein Modul.</div>
  </div>

  <!-- Admin-Bereich -->
  <div class="admin-section" id="admin-section" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-family:var(--fh);font-size:15px;font-weight:700">⚙ Administration</div>
    </div>
    <div class="admin-grid">
      <button class="admin-btn" onclick="openNutzerModal()">
        <span style="font-size:20px">👥</span>
        <div><div style="font-weight:600">Nutzerverwaltung</div><div class="ts">Rollen & Zugriffsrechte</div></div>
      </button>
      <button class="admin-btn" onclick="window.location.href='schulungen.html'">
        <span style="font-size:20px">🛒</span>
        <div><div style="font-weight:600">Buchungsanfragen</div><div class="ts">Oak Schulungskatalog</div></div>
      </button>
      <button class="admin-btn" id="admin-stats-btn">
        <span style="font-size:20px">📊</span>
        <div><div style="font-weight:600">Systemstatus</div><div class="ts" id="admin-stats-text">Wird geladen…</div></div>
      </button>
    </div>
  </div>

  <!-- Module -->
  <div class="section-title">Module</div>
  <div class="module-grid" id="module-grid">
    <!-- wird per JS befüllt -->
  </div>

  <!-- Fußzeile -->
  <div style="text-align:center;font-size:12px;color:var(--t3);margin-top:16px">
    EHS Manager · Oak Engineering · Version 1.0
    <span style="margin:0 8px">·</span>
    <a href="https://oak-engineering.de" target="_blank" style="color:var(--t3);text-decoration:none">oak-engineering.de</a>
  </div>

</div>
</div><!-- /app-content -->

<!-- MODAL: User-Menü -->
<div class="overlay" id="m-usermenu" onclick="if(event.target===this)closeM('m-usermenu')">
<div class="modal">
  <div class="modal-t" id="um-name">Mein Konto</div>
  <div class="ts" id="um-rolle" style="margin-bottom:16px"></div>
  <div class="divider"></div>
  <div style="margin-bottom:14px">
    <label>Claude API-Key (für KI-Funktionen)</label>
    <div style="display:flex;gap:8px">
      <input id="um-api-key" type="password" placeholder="sk-ant-…" style="font-size:12px;font-family:var(--fm)">
      <button class="btn btn-p btn-sm" onclick="saveApiKey()">Speichern</button>
    </div>
    <div class="ts" style="margin-top:4px" id="um-api-status"></div>
  </div>
  <div class="divider"></div>
  <button class="btn btn-d" style="width:100%;justify-content:center;margin-top:8px" onclick="doSignOut()">↩ Abmelden</button>
</div></div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// SHELL – Modulübersicht
// ═══════════════════════════════════════════════════════════

const MODULES_CONFIG = [
  {
    id: 'datenbank',
    name: 'Datenbank',
    icon: '🗄',
    desc: 'Maschinen, Gefahrstoffe, Arbeitsmittel, PSA, Beauftragte, Bereiche, Tätigkeiten, Besucher und Rechtskataster verwalten.',
    href: 'datenbank.html',
    accent: '#2980b9',
    stats: async () => {
      try {
        const data = await dbGet('maschinen');
        const gsData = await dbGet('gefahrstoffe');
        const m = Array.isArray(data) ? data : [];
        const g = Array.isArray(gsData) ? gsData : [];
        const chips = [
          { label: m.length + ' Maschinen', cls: '' },
          { label: g.length + ' Gefahrstoffe', cls: '' },
        ];
        const ohneGS = g.filter(x => !x.sdb_datei).length;
        if (ohneGS > 0) chips.push({ label: ohneGS + ' ohne SDB', cls: 'nok' });
        return chips;
      } catch { return []; }
    }
  },
  {
    id: 'schulungen',
    name: 'Schulungen',
    icon: '📚',
    desc: 'Online-Schulungen erstellen und durchführen, Präsenztermine planen, Teilnahme dokumentieren. Oak Engineering Schulungen buchen.',
    href: 'schulungen.html',
    accent: '#2d6a2d',
    stats: async () => {
      try {
        const { data } = await getSB().from('protokolle')
          .select('id,bestanden,datum')
          .gte('datum', new Date(Date.now()-30*24*60*60*1000).toISOString());
        const total = data?.length || 0;
        const best = data?.filter(p=>p.bestanden).length || 0;
        const { data: sch } = await getSB().from('schulungen').select('id');
        return [
          { label: (sch?.length||0) + ' Schulungen', cls: '' },
          { label: total + ' Durchführungen (30 Tage)', cls: '' },
          ...(total > 0 ? [{ label: Math.round(best/total*100) + '% bestanden', cls: best/total >= 0.8 ? 'ok' : 'warn' }] : []),
        ];
      } catch { return []; }
    }
  },
  {
    id: 'gbu',
    name: 'GBU & Betriebsanweisungen',
    icon: '📋',
    desc: 'Gefährdungsbeurteilungen KI-gestützt erstellen, Betriebsanweisungen nach TRGS 555 / BetrSichV §12 generieren und exportieren.',
    href: 'gbu.html',
    accent: '#8e44ad',
    stats: async () => {
      try {
        const gbuListe = await dbGet('gbu_liste') || [];
        const freigegeben = gbuListe.filter(g=>g.status==='freigegeben').length;
        return [
          { label: gbuListe.length + ' GBU', cls: '' },
          ...(freigegeben ? [{ label: freigegeben + ' freigegeben', cls: 'ok' }] : []),
        ];
      } catch { return []; }
    }
  },
  {
    id: 'dashboard',
    name: 'Dashboard',
    icon: '📊',
    desc: 'Kennzahlen, Auswertungen und Übersichten auf einen Blick. Überfällige Prüfungen, Schulungsquoten und mehr.',
    href: 'dashboard.html',
    accent: '#e67e22',
    kommt: true,
    stats: async () => [{ label: 'In Entwicklung', cls: 'warn' }]
  },
];

let currentProfile = null;
let _tt;
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>t.className='toast',3000);}
function openM(id){document.getElementById(id)?.classList.add('on');}
function closeM(id){document.getElementById(id)?.classList.remove('on');}
function getApiKey(){return localStorage.getItem('ehs_api_key')||'';}

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  requireAuth(async (user, profile) => {
    currentProfile = profile;
    document.getElementById('app-content').style.display = 'flex';
    updateUI(profile);
    renderModules(profile);
    loadAdminStats(profile);
  });
});

function updateUI(p) {
  // Hero-Begrüßung
  const stunde = new Date().getHours();
  const gruss = stunde < 12 ? 'Guten Morgen' : stunde < 17 ? 'Guten Tag' : 'Guten Abend';
  document.getElementById('hero-title').textContent = `${gruss}, ${p?.name?.split(' ')[0] || 'Willkommen'} 👋`;
  document.getElementById('hero-sub').textContent =
    `${new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · EHS Manager Oak Engineering`;
  // Nav
  document.getElementById('u-av').textContent = p?.kuerzel || p?.name?.slice(0,2).toUpperCase() || '?';
  document.getElementById('u-name').textContent = p?.name || '–';
  document.getElementById('role-display').innerHTML =
    `<span class="role-badge ${p?.rolle==='admin'?'role-admin':'role-ma'}">${p?.rolle==='admin'?'Admin':'Mitarbeiter'}</span>`;
  // Admin-Bereich
  if (isAdmin(p)) document.getElementById('admin-section').style.display = 'block';
}

async function renderModules(p) {
  const grid = document.getElementById('module-grid');
  grid.innerHTML = MODULES_CONFIG.map((m,i) => {
    const hasRead = canRead(m.id, p);
    const locked = !hasRead;
    const kommt = m.kommt;
    const cls = `module-card${locked?' locked':''}${kommt?' locked':''}`;
    const href = locked || kommt ? 'javascript:void(0)' : m.href;
    const onclick = locked
      ? `showAccessDenied('${m.id}')`
      : kommt ? '' : '';
    return `<a class="${cls}" href="${href}" ${onclick?`onclick="${onclick}"`:''}
              style="animation-delay:${i*0.06}s">
      <div class="module-accent" style="background:${m.accent}"></div>
      <div class="module-icon">${m.icon}</div>
      <div class="module-name">${m.name}</div>
      <div class="module-desc">${m.desc}</div>
      <div class="module-stats" id="stats-${m.id}">
        <span class="stat-chip" style="color:var(--t3)">Wird geladen…</span>
      </div>
      ${locked ? '<div class="locked-msg">Kein Zugriff – Admin kontaktieren</div>' : ''}
      ${kommt ? '<div class="locked-msg">In Kürze verfügbar</div>' : ''}
    </a>`;
  }).join('');
  // Stats asynchron laden
  for (const m of MODULES_CONFIG) {
    try {
      const chips = await m.stats();
      const el = document.getElementById('stats-'+m.id);
      if (el) el.innerHTML = chips.length
        ? chips.map(c => `<span class="stat-chip ${c.cls||''}">${c.label}</span>`).join('')
        : '<span class="stat-chip">–</span>';
    } catch {}
  }
}

async function loadAdminStats(p) {
  if (!isAdmin(p)) return;
  try {
    const [{ count: nutzer }, { count: anfragen }] = await Promise.all([
      getSB().from('profiles').select('*', {count:'exact',head:true}),
      getSB().from('buchungsanfragen').select('*', {count:'exact',head:true}).eq('status','offen')
    ]);
    document.getElementById('admin-stats-text').textContent =
      `${nutzer||0} Nutzer · ${anfragen||0} offene Anfragen`;
  } catch {}
}

// ── User-Menü ─────────────────────────────────────────────
function openUserMenu() {
  const p = currentProfile;
  document.getElementById('um-name').textContent = p?.name || 'Mein Konto';
  document.getElementById('um-rolle').textContent =
    (p?.rolle==='admin' ? '👑 Administrator' : '👤 Mitarbeiter') + (p?.kuerzel ? ' · ' + p.kuerzel : '');
  document.getElementById('um-api-key').value = getApiKey();
  document.getElementById('um-api-status').textContent = '';
  openM('m-usermenu');
}

function saveApiKey() {
  const k = document.getElementById('um-api-key').value.trim();
  localStorage.setItem('ehs_api_key', k);
  document.getElementById('um-api-status').textContent = k ? '✓ Gespeichert' : 'Gelöscht';
  toast('API-Key gespeichert ✓', 'ok');
}

async function doSignOut() {
  closeM('m-usermenu');
  await signOut();
}
</script>
</body>
</html>
