<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EHS Datenbank – Oak Engineering</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f3;--s1:#ffffff;--s2:#f0efec;--s3:#e8e7e3;
  --border:#d8d7d2;--b2:#c0bfba;--accent:#1a1a1a;--a2:#4a4a4a;
  --ok:#2d6a2d;--nok:#c0392b;--warn:#b7860a;
  --text:#1a1a1a;--t2:#555550;--t3:#999990;
  --r:8px;--ff:'DM Sans',sans-serif;--fm:'DM Mono',monospace;--fh:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--ff);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.topnav{height:56px;background:#1a1a1a;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-img{height:30px;width:auto;display:block;filter:invert(1)}
.logo-divider{width:1px;height:22px;background:rgba(255,255,255,.2)}
.logo-module{font-size:12px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase}
.nav-link{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);cursor:pointer;font-size:12px;color:rgba(255,255,255,.8);text-decoration:none;font-family:var(--ff)}
.nav-link:hover{background:rgba(255,255,255,.18)}
.user-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);cursor:pointer;font-size:12px;color:rgba(255,255,255,.75)}
.user-chip:hover{background:rgba(255,255,255,.15)}
.user-av{width:22px;height:22px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#1a1a1a}
.role-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.role-admin{background:rgba(183,134,10,.2);color:#b7860a;border:1px solid rgba(183,134,10,.3)}
.role-ma{background:rgba(45,106,45,.15);color:#2d6a2d;border:1px solid rgba(45,106,45,.25)}
.app{flex:1;overflow:hidden;display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;padding:16px;max-width:980px;margin:0 auto;width:100%;padding-bottom:80px}
.type-tabs{display:flex;gap:3px;background:var(--s2);border-radius:8px;padding:4px;border:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.type-tab{flex:1;min-width:80px;padding:8px 6px;border-radius:5px;border:none;background:transparent;color:var(--t2);font-family:var(--ff);font-size:11px;cursor:pointer;transition:all .18s;text-align:center;font-weight:400;line-height:1.4}
.type-tab br{display:block}
.type-tab:first-line{font-size:18px}
.type-tab.on{background:#1a1a1a;color:#fff;font-weight:600}
label{display:block;font-size:12px;color:var(--t2);margin-bottom:5px;font-weight:500}
input,select,textarea{width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#1a1a1a}
textarea{resize:vertical;min-height:70px}
select option{background:var(--s2)}
input[type=file]{display:none}
input[type=checkbox]{width:auto;accent-color:#1a1a1a}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}}
.btn{padding:9px 16px;border-radius:6px;border:none;cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:500;transition:all .18s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-p{background:#1a1a1a;color:#fff}.btn-p:hover{background:#333}
.btn-ok{background:var(--ok);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--t2)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
.btn-d{background:transparent;border:1px solid rgba(192,57,43,.3);color:var(--nok)}.btn-d:hover{background:rgba(192,57,43,.06)}
.btn-warn{background:rgba(183,134,10,.1);border:1px solid rgba(183,134,10,.3);color:var(--warn)}
.btn-sm{padding:6px 11px;font-size:12px}
.gap{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fb{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-family:var(--fm)}
.b-ok{background:rgba(45,106,45,.1);color:var(--ok);border:1px solid rgba(45,106,45,.25)}
.b-nok{background:rgba(192,57,43,.1);color:var(--nok);border:1px solid rgba(192,57,43,.25)}
.b-warn{background:rgba(183,134,10,.1);color:var(--warn);border:1px solid rgba(183,134,10,.25)}
.b-info{background:rgba(26,26,26,.07);color:var(--a2);border:1px solid rgba(26,26,26,.15)}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.obj-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.obj-card:hover{border-color:var(--b2)}
.obj-card-body{padding:14px 16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.overlay.on{display:flex}
.modal{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px;width:100%;max-width:640px;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.modal-wide{max-width:800px}
.modal-t{font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:18px}
.modal-act{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.section-block{background:var(--s2);border-radius:7px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.section-label{font-family:var(--fm);font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;color:var(--t2)}
.ts{font-size:12px;color:var(--t3)}
.font-mono{font-family:var(--fm)}
.divider{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty-i{font-size:44px;margin-bottom:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;border:1px solid #333;border-radius:7px;padding:10px 20px;font-size:13px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;color:#fff}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)}.toast.err{background:var(--nok)}
.sdb-block{background:rgba(192,57,43,.04);border:1px solid rgba(192,57,43,.2);border-radius:8px;padding:14px;margin-bottom:12px}
.sdb-block.ok{background:rgba(45,106,45,.04);border-color:rgba(45,106,45,.2)}
.doc-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:5px;background:rgba(26,26,26,.07);border:1px solid rgba(26,26,26,.15);color:var(--text);font-size:12px;cursor:pointer}
.doc-chip:hover{background:rgba(26,26,26,.12)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.chat-msg{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:13px;line-height:1.6;max-width:85%}
.chat-user{background:#1a1a1a;color:#fff;margin-left:auto;border-radius:8px 8px 2px 8px}
.chat-ai{background:var(--s2);border:1px solid var(--border);border-radius:8px 8px 8px 2px}
/* Readonly-Overlay für Lesezugriff */
.readonly-overlay{position:absolute;inset:0;background:rgba(245,245,243,.6);z-index:10;border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:not-allowed}
</style>
</head>
<body>
<div id="app-content" style="display:none;flex-direction:column;height:100%">

<nav class="topnav">
  <div class="logo-wrap">
    <img src="logo.png" alt="Oak Engineering" class="logo-img">
    <div class="logo-divider"></div>
    <span class="logo-module">EHS · Datenbank</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="index.html" class="nav-link">← Übersicht</a>
    <span id="role-display"></span>
    <div class="user-chip" onclick="openUserMenuDB()">
      <div class="user-av" id="u-av">?</div>
      <span id="u-name">–</span>
    </div>
  </div>
</nav>

<div class="app"><div class="main">

  <!-- Readonly-Banner -->
  <div id="readonly-banner" style="display:none;padding:8px 14px;background:rgba(183,134,10,.08);border:1px solid rgba(183,134,10,.25);border-radius:8px;margin-bottom:14px;font-size:13px;color:var(--warn)">
    👁 Sie haben nur Lesezugriff auf die Datenbank. Änderungen sind nicht möglich.
  </div>

  <div class="type-tabs" id="main-tabs">
    <button class="type-tab on" onclick="switchTab('maschine')"       id="tab-maschine">🏭<br>Maschinen</button>
    <button class="type-tab"    onclick="switchTab('gefahrstoff')"    id="tab-gefahrstoff">☣<br>Gefahrstoffe</button>
    <button class="type-tab"    onclick="switchTab('arbeitsmittel')"  id="tab-arbeitsmittel">🔧<br>Arbeitsmittel</button>
    <button class="type-tab"    onclick="switchTab('psa')"            id="tab-psa">🦺<br>PSA</button>
    <button class="type-tab"    onclick="switchTab('taetigkeiten')"   id="tab-taetigkeiten">⚙<br>Tätigkeiten</button>
    <button class="type-tab"    onclick="switchTab('beauftragte')"    id="tab-beauftragte">👤<br>Beauftragte</button>
    <button class="type-tab"    onclick="switchTab('bereiche')"       id="tab-bereiche">🏢<br>Bereiche</button>
    <button class="type-tab"    onclick="switchTab('besucher')"       id="tab-besucher">👁<br>Besucher</button>
    <button class="type-tab"    onclick="switchTab('rechtskataster')" id="tab-rechtskataster">📜<br>Rechtskataster</button>
  </div>

  <div class="fb" style="margin-bottom:14px">
    <div>
      <h2 style="font-family:var(--fh);font-size:20px" id="list-title">Maschinen</h2>
      <div class="ts" id="list-sub"></div>
    </div>
    <div class="gap" id="list-actions">
      <button class="btn btn-p btn-sm write-only" onclick="openAdd()" id="btn-add" style="display:none">+ Anlegen</button>
      <button class="btn btn-o btn-sm" onclick="openPSAExport()" id="btn-psa-export" style="display:none">📄 PSA-Plan exportieren</button>
    </div>
  </div>
  <div id="obj-list"><div class="empty"><div class="empty-i">⏳</div><p>Wird geladen…</p></div></div>

</div></div>
</div><!-- /app-content -->

<!-- MODAL: Anlegen/Bearbeiten -->
<div class="overlay" id="m-obj" onclick="if(event.target===this)closeM('m-obj')">
<div class="modal modal-wide" style="max-height:90vh;overflow-y:auto">
  <div class="fb" style="margin-bottom:16px;position:sticky;top:0;background:#fff;z-index:5;padding-bottom:10px;border-bottom:1px solid var(--border)">
    <div class="modal-t" style="margin:0" id="m-obj-title">Anlegen</div>
    <button class="btn btn-o btn-sm" onclick="closeM('m-obj')">✕</button>
  </div>
  <input type="hidden" id="obj-edit-id">
  <div id="obj-fields" style="display:flex;flex-direction:column;gap:12px;margin-top:12px"></div>
  <div class="modal-act">
    <button class="btn btn-o" onclick="closeM('m-obj')">Abbrechen</button>
    <button class="btn btn-p" onclick="saveObj()">
      <span class="spinner" id="save-obj-spinner" style="display:none"></span>Speichern
    </button>
  </div>
</div></div>

<!-- MODAL: Nutzer-Menü -->
<div class="overlay" id="m-usermenu-db" onclick="if(event.target===this)closeM('m-usermenu-db')">
<div class="modal" style="max-width:360px">
  <div class="fb" style="margin-bottom:4px">
    <div class="modal-t" style="margin:0" id="um-name-db">Mein Konto</div>
    <button class="btn btn-o btn-sm" onclick="closeM('m-usermenu-db')">✕</button>
  </div>
  <div class="ts" id="um-rolle-db" style="margin-bottom:16px"></div>
  <div class="divider"></div>
  <div style="margin-bottom:14px">
    <label>Claude API-Key (für KI-Funktionen)</label>
    <div style="display:flex;gap:8px">
      <input id="um-api-key-db" type="password" placeholder="sk-ant-…" style="font-size:12px;font-family:var(--fm)">
      <button class="btn btn-p btn-sm" onclick="saveApiKeyDB()">Speichern</button>
    </div>
    <div class="ts" style="margin-top:4px" id="um-api-status-db"></div>
  </div>
  <div class="divider"></div>
  <button class="btn btn-o" style="width:100%;justify-content:center;margin-bottom:8px;display:none" id="um-nutzerverwaltung-btn" onclick="closeM('m-usermenu-db');openNutzerModal()">👥 Nutzerverwaltung</button>
  <button class="btn btn-d" style="width:100%;justify-content:center" onclick="doSignOutDB()">↩ Abmelden</button>
</div></div>

<!-- MODAL: KI-Chatbot -->
<div class="overlay" id="m-chatbot" onclick="if(event.target===this)closeM('m-chatbot')">
<div class="modal modal-wide" style="max-height:90vh;display:flex;flex-direction:column">
  <div class="fb" style="margin-bottom:12px;flex-shrink:0">
    <div>
      <div class="modal-t" style="margin:0">🤖 EHS-Assistent</div>
      <div class="ts">Stellt Antworten aus Ihren Dokumenten zusammen</div>
    </div>
    <button class="btn btn-o btn-sm" onclick="closeM('m-chatbot')">✕</button>
  </div>
  <div id="chat-messages" style="flex:1;overflow-y:auto;padding:4px 0;min-height:200px;max-height:50vh"></div>
  <div style="margin-top:12px;flex-shrink:0">
    <div style="display:flex;gap:8px">
      <input id="chat-input" placeholder="Frage zum Rechtskataster stellen…" onkeydown="if(event.key==='Enter')sendChatMsg()" style="flex:1">
      <button class="btn btn-p" onclick="sendChatMsg()"><span class="spinner" id="chat-spinner" style="display:none"></span>Senden</button>
    </div>
    <div class="ts" style="margin-top:6px">Basiert auf Ihren hochgeladenen Dokumenten im Rechtskataster</div>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// GLOBALE DATEN
// ═══════════════════════════════════════════════════════════
let currentTab = 'maschine';
let currentProfile = null;
let canWriteDB = false;

// Lokale Datenarrays (aus Supabase geladen)
let DB = {
  maschinen:[], gefahrstoffe:[], arbeitsmittel:[], beauftragte:[],
  bereiche:[], taetigkeiten:[], psa:[], besucher:[], rechtskataster:[],
  profiles:[]
};

const BEAUFTRAGTE_TYPEN = [
  'Ersthelfer','Brandschutzhelfer','Sicherheitsbeauftragter',
  'Sicherheitsfachkraft (SiFa)','Laserschutzbeauftragter',
  'Strahlenschutzbeauftragter','Datenschutzbeauftragter',
  'Gefahrgutbeauftragter','Abfallbeauftragter',
  'Immissionsschutzbeauftragter','Betriebsarzt','Weitere'
];
const GEFAEHRDUNGSKATS = [
  'Mechanisch','Elektrisch','Gefahrstoffe / Chemisch','Brand / Explosion',
  'Thermisch','Lärm / Vibration','Strahlung','Psychisch',
  'Physische Belastung','Arbeitsumgebung','Biologisch','Absturz / Sturz','Verkehr / Transport'
];
const PSA_TYPEN = [
  'Kopfschutz','Augenschutz','Gehörschutz','Atemschutz',
  'Handschutz','Fußschutz','Körperschutz','Absturzschutz','Sonstiges'
];
const NORMEN_VORSCHLAEGE = [
  'ArbSchG','BetrSichV','GefStoffV','DGUV V1','DGUV V3','ASR A1.3',
  'TRGS 510','TRGS 528','TRGS 611','TRGS 900','EN ISO 20430',
  'DIN VDE 0105-100','AwSV','LasthandhabV'
];

function uid(p='X'){return p+Date.now()+Math.random().toString(36).slice(2,5);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function fmt(iso){if(!iso)return'–';try{return new Date(iso).toLocaleDateString('de-DE');}catch{return iso;}}
function fmtDT(iso){if(!iso)return'–';try{return new Date(iso).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return iso;}}

let _tt;
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>t.className='toast',3000);}
function openM(id){document.getElementById(id)?.classList.add('on');}
function closeM(id){document.getElementById(id)?.classList.remove('on');}
function getApiKey(){return localStorage.getItem('ehs_api_key')||'';}

async function claudeFetch(body){
  const key=getApiKey();
  if(!key){openUserMenuDB();throw new Error('Bitte API-Key hinterlegen');}
  return fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)});
}

// ── INIT ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  requireAuth(async (user, profile) => {
    currentProfile = profile;
    canWriteDB = canWrite('datenbank', profile);
    document.getElementById('app-content').style.display = 'flex';
    updateNavUI();
    applyWriteUI();
    if (!canRead('datenbank', profile)) { showAccessDenied('datenbank'); return; }
    await loadAllData();
    switchTab('maschine');
  });
});

function updateNavUI() {
  const p = currentProfile;
  document.getElementById('u-av').textContent = p?.kuerzel || p?.name?.slice(0,2).toUpperCase() || '?';
  document.getElementById('u-name').textContent = p?.name || '–';
  const rd = document.getElementById('role-display');
  rd.innerHTML = `<span class="role-badge ${p?.rolle==='admin'?'role-admin':'role-ma'}">${p?.rolle==='admin'?'Admin':'Mitarbeiter'}</span>`;
}

function applyWriteUI() {
  const w = canWriteDB;
  if (!w) document.getElementById('readonly-banner').style.display = 'block';
  document.querySelectorAll('.write-only').forEach(el => el.style.display = w ? '' : 'none');
}

async function loadAllData() {
  try {
    // Daten aus Supabase laden (key/value Tabelle für Bestandsdaten)
    const [masch, gefahr, arbeit, beauf, ber, taet] = await Promise.all([
      dbGet('maschinen'), dbGet('gefahrstoffe'), dbGet('arbeitsmittel'),
      dbGet('beauftragte'), dbGet('bereiche'), dbGet('taetigkeiten')
    ]);
    DB.maschinen    = masch    || S_get('po_maschinen', []);
    DB.gefahrstoffe = gefahr   || S_get('po_gefahrstoffe', []);
    DB.arbeitsmittel= arbeit   || S_get('po_arbeitsmittel', []);
    DB.beauftragte  = beauf    || S_get('po_beauftragte', []);
    DB.bereiche     = ber      || S_get('po_bereiche', []);
    DB.taetigkeiten = taet     || S_get('po_taetigkeiten', []);
    // Neue Tabellen
    [DB.psa, DB.besucher, DB.rechtskataster, DB.profiles] = await Promise.all([
      psaGetAll(), besucherGetAll(), rechtskatasterGetAll(), profilesGetAll()
    ]);
  } catch(e) {
    toast('Fehler beim Laden: ' + e.message, 'err');
  }
}

// localStorage Fallback für Migration
function S_get(key, def) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; } catch { return def; } }

async function saveArr(tabKey) {
  if (!canWriteDB) { toast('Kein Schreibzugriff','err'); return; }
  const map = {
    maschine:'maschinen', gefahrstoff:'gefahrstoffe', arbeitsmittel:'arbeitsmittel',
    beauftragte:'beauftragte', bereiche:'bereiche', taetigkeiten:'taetigkeiten'
  };
  const dbKey = map[tabKey] || tabKey;
  if (DB[dbKey] !== undefined) {
    try { await dbSet(dbKey, DB[dbKey]); } catch(e) { toast('Sync-Fehler: ' + e.message, 'err'); }
  }
}

// ── User-Menü ─────────────────────────────────────────────
function openUserMenuDB() {
  const p = currentProfile;
  document.getElementById('um-name-db').textContent = p?.name || 'Mein Konto';
  document.getElementById('um-rolle-db').textContent = (p?.rolle==='admin'?'👑 Administrator':'👤 Mitarbeiter') + (p?.kuerzel?' · '+p.kuerzel:'');
  document.getElementById('um-api-key-db').value = getApiKey();
  document.getElementById('um-api-status-db').textContent = '';

// ── Tab-Switching ──────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  const tabs = ['maschine','gefahrstoff','arbeitsmittel','psa','taetigkeiten','beauftragte','bereiche','besucher','rechtskataster'];
  tabs.forEach(t => document.getElementById('tab-'+t)?.classList.toggle('on', t===tab));
  const labels = {
    maschine:'Maschinen', gefahrstoff:'Gefahrstoffe', arbeitsmittel:'Arbeitsmittel',
    psa:'Persönliche Schutzausrüstung (PSA)', taetigkeiten:'Tätigkeiten & Gefährdungen',
    beauftragte:'Beauftragte', bereiche:'Bereiche', besucher:'Besucher',
    rechtskataster:'Rechtskataster & KI-Assistent'
  };
  document.getElementById('list-title').textContent = labels[tab] || tab;
  const addBtn = document.getElementById('btn-add');
  if (addBtn) addBtn.style.display = canWriteDB ? 'inline-flex' : 'none';
  const exportBtn = document.getElementById('btn-psa-export');
  if (exportBtn) exportBtn.style.display = (tab==='psa') ? 'inline-flex' : 'none';
  renderList();
}

function getArr() {
  const map = {
    maschine:'maschinen', gefahrstoff:'gefahrstoffe', arbeitsmittel:'arbeitsmittel',
    psa:'psa', taetigkeiten:'taetigkeiten', beauftragte:'beauftragte',
    bereiche:'bereiche', besucher:'besucher', rechtskataster:'rechtskataster'
  };
  return DB[map[currentTab]] || [];
}

function typeLabel() {
  return {maschine:'Maschine',gefahrstoff:'Gefahrstoff',arbeitsmittel:'Arbeitsmittel',
    psa:'PSA-Artikel',taetigkeiten:'Tätigkeit',beauftragte:'Beauftragter',
    bereiche:'Bereich',besucher:'Besucher',rechtskataster:'Dokument'}[currentTab] || currentTab;
}

// ═══════════════════════════════════════════════════════════
// LISTEN-RENDERING
// ═══════════════════════════════════════════════════════════
function renderList() {
  if (currentTab === 'rechtskataster') return renderRechtskatasterList();
  const el = document.getElementById('obj-list');
  const data = getArr();
  document.getElementById('list-sub').textContent = data.length + ' ' + typeLabel() + (data.length!==1?'e':'');
  if (!data.length) {
    el.innerHTML = `<div class="empty"><div class="empty-i">${tabIcon()}</div>
      <p style="margin-bottom:14px">Noch keine ${typeLabel()}e angelegt.</p>
      ${canWriteDB?`<button class="btn btn-p" onclick="openAdd()">+ ${typeLabel()} anlegen</button>`:''}</div>`;
    return;
  }
  el.innerHTML = data.map(obj => renderCard(obj)).join('');
}

function tabIcon() {
  return {maschine:'🏭',gefahrstoff:'☣',arbeitsmittel:'🔧',psa:'🦺',
    taetigkeiten:'⚙',beauftragte:'👤',bereiche:'🏢',besucher:'👁',rechtskataster:'📜'}[currentTab]||'📋';
}

function renderCard(obj) {
  const w = canWriteDB;
  let info = '';
  if (currentTab==='maschine')
    info = [obj.hersteller,obj.baujahr,obj.standort].filter(Boolean).join(' · ');
  else if (currentTab==='gefahrstoff')
    info = [obj.cas?'CAS '+obj.cas:'',obj.lieferant].filter(Boolean).join(' · ');
  else if (currentTab==='arbeitsmittel')
    info = [obj.kategorie,obj.naechsteP?'Prüfung: '+fmt(obj.naechsteP):''].filter(Boolean).join(' · ');
  else if (currentTab==='psa')
    info = [obj.typ,obj.norm].filter(Boolean).join(' · ');
  else if (currentTab==='taetigkeiten')
    info = obj.beschreibung?.slice(0,80)||'';
  else if (currentTab==='beauftragte')
    info = [].concat(obj.funktionen||[obj.funktion]).filter(Boolean).join(', ');
  else if (currentTab==='bereiche') {
    const verantw = DB.beauftragte.find(b=>b.id===obj.verantwortlichId);
    info = [verantw?'👤 '+verantw.name:'', obj.gebaeude?'🏗 '+obj.gebaeude:'', obj.funktion?'🏷 '+obj.funktion:''].filter(Boolean).join(' · ');
  } else if (currentTab==='besucher')
    info = [obj.firma,obj.anlass,obj.von?fmt(obj.von):''].filter(Boolean).join(' · ');

  const overdue = obj.naechsteWeiterbildung && new Date(obj.naechsteWeiterbildung)<new Date();
  const sdbWarn = currentTab==='gefahrstoff' && !obj.sdb_datei;

  return `<div class="obj-card">
    <div class="obj-card-body">
      <div style="min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
          <span style="font-size:15px;font-weight:600">${esc(obj.name)}</span>
          ${obj.id_nr||obj.nr?`<span class="ts font-mono">${esc(obj.id_nr||obj.nr)}</span>`:''}
          ${obj.signalwort?`<span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:${obj.signalwort==='Gefahr'?'rgba(192,57,43,.12)':'rgba(183,134,10,.12)'};color:${obj.signalwort==='Gefahr'?'var(--nok)':'var(--warn)'}">${obj.signalwort.toUpperCase()}</span>`:''}
          ${sdbWarn?'<span class="badge b-nok">⚠ Kein SDB</span>':''}
          ${overdue?'<span class="badge b-nok">⏰ Weiterbildung überfällig</span>':''}
          ${obj.pflicht==='ja'?'<span class="badge b-warn">Pflicht</span>':''}
        </div>
        ${info?`<div class="ts">${esc(info)}</div>`:''}
        ${obj.agw?`<div class="ts">AGW: ${esc(obj.agw)}${obj.wgk?' · WGK '+obj.wgk:''}</div>`:''}
        ${currentTab==='beauftragte'&&obj.naechsteWeiterbildung?`<div class="ts">📅 Nächste Weiterbildung: ${fmt(obj.naechsteWeiterbildung)}</div>`:''}
        ${currentTab==='besucher'&&obj.email?`<div class="ts">✉ ${esc(obj.email)}</div>`:''}
      </div>
      <div class="gap">
        ${w?`<button class="btn btn-o btn-sm" onclick="openEdit('${obj.id}')">✏</button>
        <button class="btn btn-d btn-sm" onclick="deleteObj('${obj.id}')">🗑</button>`:''}
      </div>
    </div>
  </div>`;
}

function openAdd() {
  if (!canWriteDB) { toast('Kein Schreibzugriff','err'); return; }
  document.getElementById('obj-edit-id').value = '';
  document.getElementById('m-obj-title').textContent = typeLabel() + ' anlegen';
  renderFields(null);
  openM('m-obj');
  setTimeout(() => document.getElementById('f-name')?.focus(), 120);
}

function openEdit(id) {
  if (!canWriteDB) { toast('Kein Schreibzugriff','err'); return; }
  const obj = getArr().find(x => x.id === id); if (!obj) return;
  document.getElementById('obj-edit-id').value = id;
  document.getElementById('m-obj-title').textContent = typeLabel() + ' bearbeiten';
  renderFields(obj);
  openM('m-obj');
}

async function deleteObj(id) {
  if (!canWriteDB) { toast('Kein Schreibzugriff','err'); return; }
  if (!confirm(typeLabel() + ' wirklich löschen?')) return;
  const arr = getArr();
  const idx = arr.findIndex(x => x.id === id);
  if (idx >= 0) arr.splice(idx, 1);
  if (currentTab === 'psa') { await psaDelete(id); DB.psa = await psaGetAll(); }
  else if (currentTab === 'besucher') { await besucherDelete(id); DB.besucher = await besucherGetAll(); }
  else if (currentTab === 'rechtskataster') { await rechtskatasterDelete(id); DB.rechtskataster = await rechtskatasterGetAll(); }
  else await saveArr(currentTab);
  renderList(); toast('Gelöscht');
}

function gfRow(g, gi) {
  return `<div id="gf-row-${gi}" style="display:grid;grid-template-columns:190px 1fr auto;gap:8px;margin-bottom:8px">

    <button class="btn btn-d btn-sm" onclick="this.closest('[id^=gf-row]').remove()" type="button">✕</button>
  </div>`;
}
function addGF() {
  const ed = document.getElementById('gf-editor'); if (!ed) return;
  const gi = ed.children.length;
  const div = document.createElement('div');
  div.innerHTML = gfRow({kat:'',text:''}, gi);
  ed.appendChild(div.firstChild);
}

function getGF() {
  return [...document.querySelectorAll('#gf-editor > div')].map(row => ({
    kat: row.querySelector('select')?.value || '',
    text: row.querySelector('input')?.value.trim() || ''
  })).filter(g => g.kat || g.text);
}

function getMulti(id) {
  return [...(document.querySelectorAll('#'+id+' option:checked')||[])].map(o=>o.value).filter(Boolean);
}

async function saveObj() {
  if (!canWriteDB) { toast('Kein Schreibzugriff','err'); return; }

  if (!name) { toast('Bezeichnung erforderlich','err'); return; }
  const sp = document.getElementById('save-obj-spinner');
  sp.style.display = 'inline-block';
  const editId = document.getElementById('obj-edit-id').value;
  const arr = getArr();
  const prev = editId ? arr.find(x=>x.id===editId) : null;
  const t = currentTab;

  let obj = {
    id: prev?.id || uid('OBJ'), name,
    notizen: document.getElementById('f-notizen')?.value.trim() || '',
    createdAt: prev?.createdAt || new Date().toISOString()
  };

  try {
    if (t==='beauftragte') {
      const funktionen = [...document.querySelectorAll('#funktionen-picker input:checked')].map(c=>c.value);
      Object.assign(obj, {
        funktionen, funktion: funktionen[0]||'',

        bestelltBis: document.getElementById('f-bestellt-bis')?.value,

        naechsteWeiterbildung: document.getElementById('f-naechste-wb')?.value,
        kostenstelle: document.getElementById('f-kst')?.value.trim()
      });
    } else if (t==='bereiche') {
      // Ggf. neuen Verantwortlichen anlegen
      let verantwId = document.getElementById('f-verantwortlich')?.value||'';
      const vnName = document.getElementById('vn-name')?.value.trim();
      if (vnName) {
        verantwId = await saveBereichVerantwortlichen();
      }
      Object.assign(obj, {
        funktion: document.getElementById('f-funktion')?.value.trim(),
        gebaeude: document.getElementById('f-gebaeude')?.value.trim(),
        kostenstelle: document.getElementById('f-kst')?.value.trim(),
        verantwortlichId: verantwId,
      });
      if (prev) arr[arr.indexOf(prev)]=obj; else arr.push(obj);
      await saveArr(t);
    } else if (t==='besucher') {
      Object.assign(obj, {
        firma: document.getElementById('f-firma')?.value.trim(),
        email: document.getElementById('f-email')?.value.trim(),
        telefon: document.getElementById('f-tel')?.value.trim(),

        bis: document.getElementById('f-bis')?.value||null
      });
      await besucherSave(obj);
      DB.besucher = await besucherGetAll();
    } else if (t==='psa') {
      Object.assign(obj, {
        typ: document.getElementById('f-typ')?.value,
        artikelnr: document.getElementById('f-artikelnr')?.value.trim(),
        kategorie: document.getElementById('f-kategorie')?.value.trim(),
        norm: document.getElementById('f-norm')?.value.trim(),
        lieferant: document.getElementById('f-lieferant')?.value.trim(),
        zertifikat: document.getElementById('f-zertifikat')?.value.trim(),
        naechstePruefung: document.getElementById('f-naechste')?.value,
        taetigkeitenIds: getMulti('f-taetigkeitenIds'),
        gefahrstoffIds: getMulti('f-gefahrstoffIds')
      });

    } else if (t==='taetigkeiten') {

        flammpunkt: document.getElementById('f-flammpunkt')?.value.trim(),

        wgk: document.getElementById('f-wgk')?.value,
        lagerklasse: document.getElementById('f-lagerklasse')?.value.trim(),
        avv: document.getElementById('f-avv')?.value.trim(),
        sdb_datei: prev?.sdb_datei||null, sdb_name: prev?.sdb_name||null, sdb_datum: prev?.sdb_datum||null
      });
      if (pendingSDB) { obj.sdb_datei=pendingSDB.dataUrl; obj.sdb_name=pendingSDB.name; obj.sdb_datum=pendingSDB.datum; pendingSDB=null; }
      if (prev) arr[arr.indexOf(prev)]=obj; else arr.push(obj);

    } else if (t==='beauftragte') {
      // Zertifikat mitgeben falls hochgeladen
      if (_pendingZertifikat) {

      }
      if (prev) arr[arr.indexOf(prev)]=obj; else arr.push(obj);
      await saveArr(t);
    }

    closeM('m-obj');
    renderList();
    toast(typeLabel() + ' gespeichert ✓', 'ok');
  } catch(e) {
    toast('Fehler: ' + e.message, 'err');
  } finally {
    sp.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════
let pendingSDB = null;

function uploadSDB(e, objId) {
  const file = e.target.files[0]; if (!file) return;
  if (file.size>10*1024*1024) { toast('Max. 10 MB','err'); return; }
  const r = new FileReader();
  r.onload = ev => {
    if (objId) {
      const obj = DB.gefahrstoffe.find(x=>x.id===objId);
      if (obj) { obj.sdb_datei=ev.target.result; obj.sdb_name=file.name; obj.sdb_datum=new Date().toISOString(); saveArr('gefahrstoff'); openEdit(objId); }
    } else {
      pendingSDB = {dataUrl:ev.target.result, name:file.name, datum:new Date().toISOString()};
      toast(file.name+' bereit ✓','ok');
    }
  };
  r.readAsDataURL(file); e.target.value='';
}

function openSDB(id) {
  const obj = DB.gefahrstoffe.find(x=>x.id===id);
  if (!obj?.sdb_datei) return;
  const w=window.open(); w.document.write('<iframe src="'+obj.sdb_datei+'" style="width:100%;height:100vh;border:none"></iframe>');
}

async function extractSDB(objId) {
  const obj = DB.gefahrstoffe.find(x=>x.id===objId);
  if (!obj?.sdb_datei) { toast('Kein SDB','err'); return; }
  const st = document.getElementById('sdb-ki-status');
  if(st){st.style.display='block';st.innerHTML='<span style="color:var(--t2)">🤖 SDB wird ausgelesen…</span>';}
  const prompt = 'Du bist ein EHS-Experte. Lies das Sicherheitsdatenblatt vollständig.\nAntworte NUR mit JSON (kein Markdown):\n{"bezeichnung":null,"cas":null,"lieferant":null,"verwendung":null,"ueberarbeitung":null,"signalwort":null,"hsaetze":null,"psaetze":null,"agw":null,"psa":null,"flammpunkt":null,"siedepunkt":null,"wgk":null,"lagerklasse":null,"avv":null}\nNull wenn nicht gefunden.';
  try {
    const res = await claudeFetch({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:[
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:obj.sdb_datei.split(',')[1]}},
      {type:'text',text:prompt}
    ]}]});
    const data = await res.json();
    if (!res.ok) { if(st)st.innerHTML='<span style="color:var(--nok)">Fehler</span>'; return; }
    const text = (data.content||[]).map(b=>b.text||'').join('');
    let parsed; try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){if(st)st.innerHTML='<span style="color:var(--nok)">Parse-Fehler</span>';return;}
    const set=(id,val)=>{const el=document.getElementById(id);if(el&&val!=null)el.value=val;};
    set('f-name',parsed.bezeichnung);set('f-cas',parsed.cas);
    set('f-lieferant',parsed.lieferant);set('f-verwendung',parsed.verwendung);
    set('f-sdb-ueberarbeitung',parsed.ueberarbeitung);set('f-signalwort',parsed.signalwort);
    set('f-agw',parsed.agw);set('f-hsaetze',parsed.hsaetze);set('f-psaetze',parsed.psaetze);
    set('f-psa',parsed.psa);set('f-flammpunkt',parsed.flammpunkt);set('f-siedepunkt',parsed.siedepunkt);
    set('f-lagerklasse',parsed.lagerklasse);set('f-avv',parsed.avv);
    if(parsed.wgk)document.getElementById('f-wgk').value=String(parsed.wgk);
    const found=Object.values(parsed).filter(v=>v!=null&&v!=='').length;
    if(st)st.innerHTML=`<span style="color:var(--ok)">✓ ${found} Felder befüllt – bitte prüfen und speichern.</span>`;
    toast(found+' Felder aus SDB befüllt ✓','ok');
  } catch(e){if(st)st.innerHTML='<span style="color:var(--nok)">'+e.message+'</span>';}
}

    </div>
    <!-- KI-Chatbot -->
    <div class="card" style="position:sticky;top:0">
      <div style="font-weight:600;margin-bottom:10px">🤖 EHS-Assistent</div>

        <button class="btn btn-p btn-sm" onclick="sendChat()"><span class="spinner" id="chat-sp" style="display:none"></span>→</button>

    </div>
  </div>
  <!-- Modal Norm hinzufügen -->
  <div class="overlay" id="m-norm" onclick="if(event.target===this)closeM('m-norm')">

    <div class="fb" style="margin-bottom:16px">
      <div class="modal-t" style="margin:0">Norm / Gesetz hinzufügen</div>

    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label>Bezeichnung *</label><input id="norm-name" placeholder="z.B. BetrSichV, TRGS 510, DGUV V1"></div>
      <div><label>Quelle / Herausgeber</label><input id="norm-quelle" placeholder="BMAS, DGUV, BAuA…"></div>
      <div><label>Aktueller Stand (Datum)</label><input id="norm-datum" type="date"></div>
      <div><label>Beschreibung</label><textarea id="norm-beschreibung" rows="2" placeholder="Worum geht es? Welche Bereiche sind betroffen?"></textarea></div>
      <div><label>Auf Änderungen überwachen</label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:400">
          <input type="checkbox" id="norm-monitor" style="width:auto;accent-color:#1a1a1a"> Ja – KI prüft regelmäßig auf Änderungen
        </label>
      </div>
    </div>
    <div class="modal-act">
      <button class="btn btn-o" onclick="closeM('m-norm')">Abbrechen</button>
      <button class="btn btn-p" onclick="saveNorm()">Speichern</button>
    </div>
  </div></div>`;
  el.innerHTML = html;
}

function uploadRKDok(e) {
  const files = [...e.target.files]; if (!files.length) return;
  files.forEach(file => {
    if (file.size>15*1024*1024) { toast(file.name+' zu groß (max. 15 MB)','err'); return; }
    const r = new FileReader();
    r.onload = async ev => {
      const dok = { id:uid('RK'), name:file.name, typ:'dokument', pdf_datei:ev.target.result, aktualisiert:new Date().toISOString() };
      await rechtskatasterSave(dok);
      DB.rechtskataster = await rechtskatasterGetAll();
      renderRechtskatasterList();
      toast(file.name+' hochgeladen ✓','ok');
    };
    r.readAsDataURL(file);
  });
  e.target.value='';
}

function addNorm() { openM('m-norm'); setTimeout(()=>document.getElementById('norm-name')?.focus(),120); }

async function saveNorm() {
  const name = document.getElementById('norm-name')?.value.trim();
  if (!name) { toast('Bezeichnung erforderlich','err'); return; }
  const norm = {
    id:uid('RK'), name, typ:'norm',
    quelle: document.getElementById('norm-quelle')?.value.trim(),
    aktualisiert: document.getElementById('norm-datum')?.value,
    beschreibung: document.getElementById('norm-beschreibung')?.value.trim(),
    monitor: document.getElementById('norm-monitor')?.checked
  };
  await rechtskatasterSave(norm);
  DB.rechtskataster = await rechtskatasterGetAll();
  closeM('m-norm');
  renderRechtskatasterList();
  toast('Norm gespeichert ✓','ok');
}

function openRKDok(id) {
  const d = DB.rechtskataster.find(x=>x.id===id);
  if (!d?.pdf_datei) return;
  const w=window.open(); w.document.write('<iframe src="'+d.pdf_datei+'" style="width:100%;height:100vh;border:none"></iframe>');
}

async function deleteRKDok(id) {
  if (!confirm('Dokument löschen?')) return;
  await rechtskatasterDelete(id);
  DB.rechtskataster = await rechtskatasterGetAll();
  renderRechtskatasterList();
  toast('Gelöscht');
}

// ── KI-Chat ────────────────────────────────────────────────
let chatHistory = [];

async function sendChat() {
  const inp = document.getElementById('chat-q');
  const q = inp?.value.trim(); if (!q) return;
  const msgs = document.getElementById('chat-msgs');
  const sp = document.getElementById('chat-sp');
  inp.value = '';
  // User-Nachricht anzeigen
  msgs.innerHTML += `<div class="chat-msg chat-user">${esc(q)}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  sp.style.display = 'inline-block';
  chatHistory.push({role:'user',content:q});
  try {
    // Relevante Dokumente als Kontext
    const pdfs = DB.rechtskataster.filter(d=>d.pdf_datei).slice(0,3);
    const normText = DB.rechtskataster.filter(d=>d.typ==='norm').map(n=>`${n.name}: ${n.beschreibung||''}`).join('\n');
    const content = [];
    pdfs.forEach(d => content.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:d.pdf_datei.split(',')[1]}}));
    content.push({type:'text',text:`Du bist ein EHS-Rechtsexperte. Beantworte die Frage auf Basis der hochgeladenen Dokumente und folgender Normen:\n${normText}\n\nFrage: ${q}\n\nAntworte präzise auf Deutsch, zitiere relevante Quellen.`});
    const res = await claudeFetch({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content}]});
    const data = await res.json();
    const answer = (data.content||[]).map(b=>b.text||'').join('') || 'Keine Antwort erhalten.';
    chatHistory.push({role:'assistant',content:answer});
    msgs.innerHTML += `<div class="chat-msg chat-ai">${answer.replace(/\n/g,'<br>')}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    msgs.innerHTML += `<div class="chat-msg chat-ai" style="color:var(--nok)">Fehler: ${esc(e.message)}</div>`;
  } finally { sp.style.display='none'; }
}

// ── Bereiche: Neuen Verantwortlichen anlegen ──────────────
function toggleVerantwNeu() {
  const el = document.getElementById('verantw-neu');
  const btn = document.getElementById('verantw-neu-toggle');
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : 'block';
  btn.innerHTML = visible ? '+ Neue Person direkt anlegen' : '✕ Abbrechen';
}

// Wird beim Speichern von Bereichen aufgerufen um ggf. neue Person anzulegen
async function saveBereichVerantwortlichen() {
  const name = document.getElementById('vn-name')?.value.trim();
  if (!name) return null; // kein neuer Verantwortlicher
  const neu = {
    id: uid('BEAUF'),
    name,
    funktionen: [document.getElementById('vn-funktion')?.value.trim() || 'Bereichsverantwortliche/r'],
    funktion: document.getElementById('vn-funktion')?.value.trim() || 'Bereichsverantwortliche/r',
    email: document.getElementById('vn-email')?.value.trim(),
    tel: document.getElementById('vn-tel')?.value.trim(),
    createdAt: new Date().toISOString()
  };
  DB.beauftragte.push(neu);
  await dbSet('beauftragte', DB.beauftragte);
  return neu.id;
}

// ── Beauftragte: Zertifikat ───────────────────────────────
let _pendingZertifikat = null;

function uploadZertifikat(e) {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 10*1024*1024) { toast('Max. 10 MB','err'); return; }
  const r = new FileReader();
  r.onload = ev => {
    _pendingZertifikat = { dataUrl: ev.target.result, name: file.name };
    const el = document.getElementById('zert-info');
    if (el) el.innerHTML = `<span style="color:var(--ok)">✓ ${esc(file.name)}</span>`;
    toast(file.name + ' bereit ✓', 'ok');
  };
  r.readAsDataURL(file); e.target.value = '';
}

function openZertifikat() {
  const editId = document.getElementById('obj-edit-id')?.value;
  const obj = editId ? DB.beauftragte.find(x=>x.id===editId) : null;
  const url = _pendingZertifikat?.dataUrl || obj?.zertifikat_datei;
  if (!url) return;
  const w = window.open(); w.document.write('<iframe src="'+url+'" style="width:100%;height:100vh;border:none"></iframe>');
}

// ── PSA-Export ────────────────────────────────────────────
function openPSAExport() {
  if (!DB.psa?.length) { toast('Keine PSA-Artikel vorhanden','err'); return; }
  const typen = [...new Set(DB.psa.map(p=>p.typ).filter(Boolean))];
  const auswahl = typen.map(t=>`
    <label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--s2);cursor:pointer;font-weight:400">
      <input type="checkbox" value="${t}" checked style="accent-color:#1a1a1a;width:auto"> ${t}
    </label>`).join('');
  const div = document.createElement('div');
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px';
  div.innerHTML=`<div style="background:#fff;border-radius:10px;padding:24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12)">
    <div style="font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:6px">PSA-Plan exportieren</div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:16px">Wählen Sie die PSA-Kategorien für den Export</div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-o" onclick="this.closest('[style*=fixed]').remove()">Abbrechen</button>
      <button class="btn btn-p" onclick="exportPSAPlan(this.closest('[style*=fixed]'))">📄 PDF-Plan erstellen</button>

}

function exportPSAPlan(overlay) {
  const selected = [...overlay.querySelectorAll('input[type=checkbox]:checked')].map(c=>c.value);
  overlay.remove();
  const items = DB.psa.filter(p=>selected.includes(p.typ));
  const gruppen = {};
  items.forEach(p=>{ if(!gruppen[p.typ])gruppen[p.typ]=[]; gruppen[p.typ].push(p); });
  const html = `<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
  <title>PSA-Plan – Oak Engineering</title>
  <style>body{font-family:'Segoe UI',sans-serif;max-width:900px;margin:0 auto;padding:32px;color:#1a1a1a}
  h1{font-size:22px;margin-bottom:4px}
  .meta{font-size:13px;color:#666;margin-bottom:24px}
  h2{font-size:16px;font-weight:700;border-bottom:2px solid #1a1a1a;padding-bottom:6px;margin:20px 0 12px}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
  th{background:#1a1a1a;color:#fff;padding:8px 12px;text-align:left;font-weight:500}
  td{padding:8px 12px;border-bottom:1px solid #e0e0e0}
  tr:nth-child(even)td{background:#f9f9f9}
  .link{color:#2980b9;text-decoration:none;font-size:12px}
  @media print{button{display:none}}
  </style></head><body>
  <h1>PSA-Plan</h1>
  <div class="meta">Oak Engineering · Stand: ${new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'})}</div>
  <button onclick="window.print()" style="padding:8px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-bottom:20px">🖨 Drucken / PDF</button>
  ${Object.entries(gruppen).map(([typ,liste])=>`
    <h2>${typ}</h2>
    <table><thead><tr>
      <th>Bezeichnung</th><th>Norm</th><th>Kategorie</th><th>Hersteller / Art.-Nr.</th><th>Zertifikat</th><th>Prüfung</th>
    </tr></thead><tbody>
    ${liste.map(p=>`<tr>
      <td><strong>${p.name||'–'}</strong>${p.notizen?`<br><span style="color:#666;font-size:11px">${p.notizen}</span>`:''}</td>
      <td>${p.norm||'–'}</td>
      <td>${p.kategorie||'–'}</td>
      <td>${p.lieferant||'–'}${p.artikelnr?' · '+p.artikelnr:''}</td>
      <td>${p.zertifikat||'–'}</td>
      <td>${p.naechstePruefung?new Date(p.naechstePruefung).toLocaleDateString('de-DE'):'–'}</td>
    </tr>`).join('')}
    </tbody></table>`).join('')}
  </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
  toast('PSA-Plan erstellt ✓','ok');
}
